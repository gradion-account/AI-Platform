<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Gradion AI Learning Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">G</div>
      <h1>Gradion Learning</h1>
      <p>AI Knowledge Platform · Internal Access</p>
    </div>

    <div class="login-hint">
      🔑 Internal access only. Contact IT for credentials.<br>
      <strong>Default: gradion2025</strong>
    </div>

    <div class="login-error" id="login-error">
      ⚠️ Incorrect password. Please try again.
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-input-wrapper">
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
          <button type="button" class="password-toggle" onclick="togglePassword()" id="pw-toggle" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn" style="justify-content:center">
        <span id="btn-text">Sign In</span>
      </button>
    </form>

    <div class="login-footer">
      <p>🏢 For Gradion employees only &nbsp;·&nbsp; <a href="mailto:it@gradion.com">it@gradion.com</a></p>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (isAuthenticated()) window.location.href = 'index.html';

  function handleLogin(e) {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');

    btn.disabled = true;
    document.getElementById('btn-text').textContent = 'Signing in…';

    setTimeout(() => {
      if (login(pw)) {
        showToast('Welcome back! 🎉', 'success');
        setTimeout(() => window.location.href = 'index.html', 500);
      } else {
        errEl.classList.add('show');
        btn.disabled = false;
        document.getElementById('btn-text').textContent = 'Sign In';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        setTimeout(() => errEl.classList.remove('show'), 4000);
      }
    }, 400);
  }

  function togglePassword() {
    const pw = document.getElementById('password');
    const btn = document.getElementById('pw-toggle');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁';
    }
  }
</script>
</body>
</html>
